<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">Mc</span>
        <h1>Macro tracker</h1>
      </div>
      <button id="reset-day" class="ghost-btn">Reset day</button>
    </header>

    <section class="goals-panel">
      <h2 class="section-label">Daily targets</h2>
      <div class="goals-grid">
        <label class="goal-field">
          <span>Calories</span>
          <input type="number" id="goal-cal" value="2400" min="0" />
        </label>
        <label class="goal-field">
          <span>Protein (g)</span>
          <input type="number" id="goal-protein" value="170" min="0" />
        </label>
        <label class="goal-field">
          <span>Carbs (g)</span>
          <input type="number" id="goal-carbs" value="265" min="0" />
        </label>
        <label class="goal-field">
          <span>Fat (g)</span>
          <input type="number" id="goal-fat" value="65" min="0" />
        </label>
        <label class="goal-field">
          <span>Fiber (g)</span>
          <input type="number" id="goal-fiber" value="35" min="0" />
        </label>
      </div>
    </section>

    <section class="progress-panel">
      <div class="metric-card">
        <div class="metric-head">
          <span class="metric-label">Calories</span>
          <span class="metric-value"><span id="eaten-cal">0</span> / <span id="display-goal-cal">2400</span></span>
        </div>
        <div class="bar-track"><div id="bar-cal" class="bar-fill cal"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-head">
          <span class="metric-label">Protein</span>
          <span class="metric-value"><span id="eaten-protein">0</span>g / <span id="display-goal-protein">170</span>g</span>
        </div>
        <div class="bar-track"><div id="bar-protein" class="bar-fill protein"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-head">
          <span class="metric-label">Carbs</span>
          <span class="metric-value"><span id="eaten-carbs">0</span>g / <span id="display-goal-carbs">265</span>g</span>
        </div>
        <div class="bar-track"><div id="bar-carbs" class="bar-fill carbs"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-head">
          <span class="metric-label">Fat</span>
          <span class="metric-value"><span id="eaten-fat">0</span>g / <span id="display-goal-fat">65</span>g</span>
        </div>
        <div class="bar-track"><div id="bar-fat" class="bar-fill fat"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-head">
          <span class="metric-label">Fiber</span>
          <span class="metric-value"><span id="eaten-fiber">0</span>g / <span id="display-goal-fiber">35</span>g</span>
        </div>
        <div class="bar-track"><div id="bar-fiber" class="bar-fill fiber"></div></div>
      </div>
    </section>

    <section class="add-panel">
      <h2 class="section-label">Add food</h2>
      <form id="add-form" class="add-form">
        <input type="text" id="food-name" placeholder="Food name" required />
        <input type="number" id="food-cal" placeholder="kcal" min="0" required />
        <input type="number" id="food-protein" placeholder="Protein (g)" min="0" step="0.1" required />
        <input type="number" id="food-carbs" placeholder="Carbs (g)" min="0" step="0.1" required />
        <input type="number" id="food-fat" placeholder="Fat (g)" min="0" step="0.1" required />
        <input type="number" id="food-fiber" placeholder="Fiber (g)" min="0" step="0.1" required />
        <button type="submit" class="primary-btn">Add</button>
      </form>
    </section>

    <section class="log-panel">
      <h2 class="section-label">Today's log</h2>
      <ul id="food-log" class="food-log"></ul>
      <p id="empty-log" class="empty-state">Nothing logged yet. Add your first item above.</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
